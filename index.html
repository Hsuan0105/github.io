<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>Kumo Nail Studio</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #fafafa;
    }
    header {
      background: #000;
      color: white;
      padding: 20px;
      text-align: center;
    }
    .container {
      padding: 20px;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
    }
    .gallery img {
      width: 100%;
      border-radius: 10px;
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 15px;
      background: #e91e63;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<header>
  <h1>Kumo Nail</h1>
  <p>美甲作品展示</p>
</header>

<div class="container">
  <h2>作品集</h2>

  <div class="gallery">
    <!-- 這裡放圖片 -->
    <img src="https://via.placeholder.com/300" />
    <img src="https://via.placeholder.com/300" />
    <img src="https://via.placeholder.com/300" />
  </div>

  <a class="btn" href="https://www.instagram.com/_kumonail" target="_blank">
    前往 Instagram
  </a>
</div>

</body>
</html>
